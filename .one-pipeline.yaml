version: '1'

# IBM Cloud Tekton OnePipeline Configuration
# Intelligent Test Orchestrator with Bob Shell Integration
#
# This pipeline automatically generates AI-powered tests for every PR
# using IBM Bob Shell (Claude 3.5 Sonnet)

setup:
  image: icr.io/continuous-delivery/pipeline/pipeline-base-image:2.71
  script: |
    #!/usr/bin/env bash
    set -eo pipefail
    
    echo "=================================================="
    echo "🔧 Setup: Intelligent Test Orchestrator"
    echo "=================================================="
    
    # Install required dependencies
    echo "📦 Installing dependencies..."
    apt-get update && apt-get install -y jq curl git wget tar gzip
    
    # Install Go (required for test execution)
    if ! command -v go &> /dev/null; then
      echo "📥 Installing Go 1.21..."
      wget -q https://go.dev/dl/go1.21.0.linux-amd64.tar.gz
      tar -C /usr/local -xzf go1.21.0.linux-amd64.tar.gz
      export PATH=$PATH:/usr/local/go/bin
    fi
    
    # Set Go environment
    export GOPATH=$HOME/go
    export PATH=$PATH:/usr/local/go/bin:$GOPATH/bin
    
    # Download Go dependencies if go.mod exists
    if [ -f "go.mod" ]; then
      echo "📥 Downloading Go dependencies..."
      go mod download
    fi
    
    echo "✅ Setup complete"

test:
  abort_on_failure: false
  image: icr.io/continuous-delivery/pipeline/pipeline-base-image:2.71
  script: |
    #!/usr/bin/env bash
    set -eo pipefail
    
    echo "=================================================="
    echo "🧪 Running Existing Test Suite"
    echo "=================================================="
    
    # Set Go environment
    export PATH=$PATH:/usr/local/go/bin:$HOME/go/bin
    export GOPATH=$HOME/go
    
    # Run existing tests to establish baseline coverage
    if [ -f "go.mod" ]; then
      echo "Running Go tests..."
      go test ./... -v -coverprofile=coverage-before.out || true
      
      if [ -f "coverage-before.out" ]; then
        COVERAGE_BEFORE=$(go tool cover -func=coverage-before.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "📊 Baseline Coverage: ${COVERAGE_BEFORE}%"
        echo "$COVERAGE_BEFORE" > .coverage-before
      fi
    elif [ -f "package.json" ]; then
      echo "Running npm tests..."
      npm test || true
    elif [ -f "requirements.txt" ] || [ -f "setup.py" ]; then
      echo "Running Python tests..."
      python -m pytest --cov || true
    else
      echo "⚠️  No test framework detected"
    fi
    
    echo "✅ Test stage complete"

ai-test-generation:
  abort_on_failure: false
  dind: true
  image: icr.io/continuous-delivery/pipeline/pipeline-base-image:2.71
  script: |
    #!/usr/bin/env bash
    
    # Make the AI test generator script executable
    chmod +x ./scripts/ai-test-generator.sh
    
    # Run the AI test generator
    ./scripts/ai-test-generator.sh

static-scan:
  abort_on_failure: false
  image: icr.io/continuous-delivery/pipeline/pipeline-base-image:2.71
  script: |
    #!/usr/bin/env bash
    set -eo pipefail
    
    echo "=================================================="
    echo "🔍 Static Code Analysis"
    echo "=================================================="
    
    # Run static analysis if tools are available
    if command -v golangci-lint &> /dev/null; then
      echo "Running golangci-lint..."
      golangci-lint run ./... || true
    fi
    
    echo "✅ Static scan complete"

deploy:
  image: icr.io/continuous-delivery/pipeline/pipeline-base-image:2.71
  script: |
    #!/usr/bin/env bash
    set -eo pipefail
    
    echo "=================================================="
    echo "🚀 Deploy Stage"
    echo "=================================================="
    
    # Add your deployment logic here
    echo "Deployment logic placeholder"
    
    echo "✅ Deploy complete"

# Pipeline Configuration
#
# Environment Variables (Configure in IBM Cloud OnePipeline UI):
#
# REQUIRED:
#   - BOBSHELL_API_KEY: IBM Bob Shell API key (primary)
#   - GIT_BRANCH: Current branch name (auto-set by pipeline)
#   - GIT_COMMIT: Current commit SHA (auto-set by pipeline)
#   - PIPELINE_RUN_URL: Pipeline run URL (auto-set by pipeline)
#
# OPTIONAL:
#   - BOB_API_KEY: Alternative Bob API key (fallback)
#   - ANTHROPIC_API_KEY: Anthropic API key (fallback)
#   - CLAUDE_API_KEY: Claude API key (fallback)
#   - GITHUB_TOKEN: GitHub token for PR operations
#   - GHE_TOKEN: GitHub Enterprise token
#   - GITHUB_ENTERPRISE_URL: GitHub Enterprise URL
#   - FUNCTIONAL_TEST_REPO: Functional test repository (e.g., "org/functional-tests")
#   - FUNCTIONAL_TEST_REPO_URL: Full URL to functional test repository
#   - BASE_BRANCH: Base branch for comparison (default: main)
#   - COVERAGE_TARGET: Target coverage percentage (default: 80)
#
# Pipeline Properties (Set in Toolchain):
#   - repository: Source code repository URL
#   - branch: Branch to build
#   - revision: Commit SHA to build
#
# Secrets (Store in IBM Cloud Secrets Manager or Key Protect):
#   - bobshell-api-key: Bob Shell API key
#   - github-token: GitHub personal access token
#   - ghe-token: GitHub Enterprise token

# Made with ❤️ by Intelligent Test Orchestrator
