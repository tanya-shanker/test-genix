apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: intelligent-test-orchestrator-pipeline
  annotations:
    description: "AI-powered test generation pipeline using IBM Bob Shell"
spec:
  params:
  - name: repository
    description: The git repository URL
    type: string
  - name: branch
    description: The git branch to build
    type: string
    default: main
  - name: revision
    description: The git revision to build
    type: string
    default: ""
  - name: pipeline-debug
    description: Enable pipeline debug mode
    type: string
    default: "0"
  - name: bobshell-api-key-secret
    description: Bob Shell API key (from OnePipeline environment)
    type: string
    default: ""
  - name: github-token-secret
    description: GitHub token (from OnePipeline environment)
    type: string
    default: ""
  - name: functional-test-repo
    description: Functional test repository (org/repo)
    type: string
    default: ""
  - name: coverage-target
    description: Target code coverage percentage
    type: string
    default: "80"
  - name: base-branch
    description: Base branch for comparison
    type: string
    default: "main"

  workspaces:
  - name: pipeline-ws
    description: Workspace for pipeline artifacts
  - name: tools-ws
    description: Workspace for shared tools and dependencies

  tasks:
  - name: setup
    taskRef:
      name: setup-task
    params:
    - name: repository
      value: $(params.repository)
    - name: branch
      value: $(params.branch)
    - name: revision
      value: $(params.revision)
    - name: pipeline-debug
      value: $(params.pipeline-debug)
    workspaces:
    - name: output
      workspace: pipeline-ws
    - name: tools-ws
      workspace: tools-ws

  - name: test
    runAfter:
    - setup
    taskRef:
      name: test-task
    params:
    - name: pipeline-debug
      value: $(params.pipeline-debug)
    workspaces:
    - name: output
      workspace: pipeline-ws
    - name: tools-ws
      workspace: tools-ws

  - name: ai-test-generation
    runAfter:
    - test
    taskRef:
      name: ai-test-generation-task
    params:
    - name: repository
      value: $(params.repository)
    - name: branch
      value: $(params.branch)
    - name: revision
      value: $(params.revision)
    - name: base-branch
      value: $(params.base-branch)
    - name: coverage-target
      value: $(params.coverage-target)
    - name: functional-test-repo
      value: $(params.functional-test-repo)
    - name: bobshell-api-key-secret
      value: $(params.bobshell-api-key-secret)
    - name: github-token-secret
      value: $(params.github-token-secret)
    - name: pipeline-debug
      value: $(params.pipeline-debug)
    workspaces:
    - name: output
      workspace: pipeline-ws
    - name: tools-ws
      workspace: tools-ws

  - name: static-scan
    runAfter:
    - ai-test-generation
    taskRef:
      name: static-scan-task
    params:
    - name: pipeline-debug
      value: $(params.pipeline-debug)
    workspaces:
    - name: output
      workspace: pipeline-ws

  - name: deploy
    runAfter:
    - static-scan
    taskRef:
      name: deploy-task
    params:
    - name: pipeline-debug
      value: $(params.pipeline-debug)
    workspaces:
    - name: output
      workspace: pipeline-ws

# Made with Bob
