apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: ai-test-generation-task
  annotations:
    description: "AI-powered test generation using IBM Bob Shell"
spec:
  params:
  - name: repository
    description: The git repository URL
    type: string
  - name: branch
    description: The git branch
    type: string
  - name: revision
    description: The git revision
    type: string
  - name: base-branch
    description: Base branch for comparison
    type: string
    default: "main"
  - name: coverage-target
    description: Target coverage percentage
    type: string
    default: "80"
  - name: functional-test-repo
    description: Functional test repository
    type: string
    default: ""
  - name: bobshell-api-key-secret
    description: Secret name for Bob Shell API key
    type: string
    default: "bobshell-api-key"
  - name: github-token-secret
    description: Secret name for GitHub token
    type: string
    default: "github-token"
  - name: pipeline-debug
    description: Enable debug mode
    type: string
    default: "0"

  workspaces:
  - name: source
    description: Workspace for source code and artifacts

  steps:
  - name: ai-test-generation
    image: icr.io/continuous-delivery/pipeline/pipeline-base-image:2.71
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    env:
    - name: PIPELINE_DEBUG
      value: $(params.pipeline-debug)
    - name: GIT_BRANCH
      value: $(params.branch)
    - name: GIT_COMMIT
      value: $(params.revision)
    - name: BASE_BRANCH
      value: $(params.base-branch)
    - name: COVERAGE_TARGET
      value: $(params.coverage-target)
    - name: FUNCTIONAL_TEST_REPO
      value: $(params.functional-test-repo)
    - name: REPOSITORY
      value: $(params.repository)
    - name: BOBSHELL_API_KEY
      valueFrom:
        secretKeyRef:
          name: $(params.bobshell-api-key-secret)
          key: api-key
          optional: true
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: $(params.github-token-secret)
          key: token
          optional: true
    workingDir: $(workspaces.source.path)
    script: |
      #!/usr/bin/env bash
      set -eo pipefail

      if [ "$PIPELINE_DEBUG" = "1" ]; then
        set -x
      fi

      echo "=================================================="
      echo "🤖 AI Test Generation with Bob Shell"
      echo "=================================================="
      echo ""
      echo "Repository: $REPOSITORY"
      echo "Branch: $GIT_BRANCH"
      echo "Commit: $GIT_COMMIT"
      echo "Base Branch: $BASE_BRANCH"
      echo ""

      # Check if secrets are loaded
      if [ -n "$BOBSHELL_API_KEY" ]; then
        echo "✅ Bob Shell API key loaded"
      else
        echo "⚠️  Bob Shell API key not found (optional)"
      fi

      if [ -n "$GITHUB_TOKEN" ]; then
        echo "✅ GitHub token loaded"
      else
        echo "⚠️  GitHub token not found (optional)"
      fi
      echo ""

      # Set Go environment
      export PATH=$PATH:/usr/local/go/bin

      # Check if Go is available
      if ! command -v go &> /dev/null; then
        echo "⚠️  Go not found, skipping test generation"
        exit 0
      fi

      echo "Go version: $(go version)"

      # Check if script exists
      if [ ! -f "./scripts/ai-test-generator.sh" ]; then
        echo "⚠️  ai-test-generator.sh not found, skipping"
        exit 0
      fi

      # Make script executable
      chmod +x ./scripts/ai-test-generator.sh

      # Run AI test generator (non-blocking)
      ./scripts/ai-test-generator.sh || true

      echo ""
      echo "=================================================="
      echo "✅ AI Test Generation Complete"
      echo "=================================================="

      exit 0

# Made with Bob
