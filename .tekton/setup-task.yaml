apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: setup-task
  annotations:
    description: "Setup environment for test orchestrator"
spec:
  params:
    - name: repository
      description: The git repository URL
      type: string
    - name: branch
      description: The git branch
      type: string
    - name: revision
      description: The git revision
      type: string
    - name: pipeline-debug
      description: Enable debug mode
      type: string
      default: "0"

  workspaces:
    - name: output
      description: Workspace for pipeline artifacts

  steps:
    - name: clone-repository
      image: icr.io/continuous-delivery/pipeline/pipeline-base-image:2.71
      env:
        - name: PIPELINE_DEBUG
          value: $(params.pipeline-debug)
        - name: REPOSITORY
          value: $(params.repository)
        - name: BRANCH
          value: $(params.branch)
        - name: REVISION
          value: $(params.revision)
      workingDir: $(workspaces.output.path)
      script: |
        #!/usr/bin/env bash
        set -eo pipefail
        
        if [ "$PIPELINE_DEBUG" = "1" ]; then
          set -x
        fi
        
        echo "=================================================="
        echo "🔧 Setup: Preparing Repository"
        echo "=================================================="
        
        pwd
        ls
        # Check if repository is already cloned
        if [ -d ".git" ]; then
          echo "Repository already exists, fetching latest changes..."
          git fetch origin
          git checkout "$BRANCH"
          git pull origin "$BRANCH"
        else
          # Check if directory has any files
          if [ "$(ls -A .)" ]; then
            echo "Workspace not empty, cleaning up..."
            # Remove all files except hidden ones that might be needed
            find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.*' -exec rm -rf {} +
          fi
          
          echo "Cloning repository..."
          git clone "$REPOSITORY" .
          git checkout "$BRANCH"
        fi
        
        # Checkout specific revision if provided
        if [ -n "$REVISION" ] && [ "$REVISION" != "" ]; then
          echo "Checking out revision: $REVISION"
          git checkout "$REVISION"
        fi
        
        echo "✅ Repository prepared successfully"

    - name: install-dependencies
      image: icr.io/continuous-delivery/pipeline/pipeline-base-image:2.71
      env:
        - name: PIPELINE_DEBUG
          value: $(params.pipeline-debug)
      workingDir: $(workspaces.output.path)
      script: |
        #!/usr/bin/env bash
        set -eo pipefail
        
        if [ "$PIPELINE_DEBUG" = "1" ]; then
          set -x
        fi
        
        echo "=================================================="
        echo "📦 Installing Dependencies"
        echo "=================================================="
        
        # Install system dependencies
        apt-get update && apt-get install -y jq curl git wget tar gzip
        
        # Install Go
        if ! command -v go &> /dev/null; then
          echo "📥 Installing Go 1.21..."
          wget -q https://go.dev/dl/go1.21.0.linux-amd64.tar.gz
          tar -C /usr/local -xzf go1.21.0.linux-amd64.tar.gz
          export PATH=$PATH:/usr/local/go/bin
        fi
        
        # Set Go environment
        export GOPATH=$HOME/go
        export PATH=$PATH:/usr/local/go/bin:$GOPATH/bin
        
        # Download Go dependencies
        if [ -f "go.mod" ]; then
          echo "📥 Downloading Go dependencies..."
          go mod download
        fi
        
        echo "✅ Dependencies installed successfully"

