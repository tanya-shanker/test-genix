apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: ai-test-generation-task
  annotations:
    description: "AI-powered test generation using IBM Bob Shell"
spec:
  params:
  - name: repository
    description: The git repository URL
    type: string
  - name: branch
    description: The git branch
    type: string
  - name: revision
    description: The git revision
    type: string
  - name: base-branch
    description: Base branch for comparison
    type: string
    default: "main"
  - name: coverage-target
    description: Target coverage percentage
    type: string
    default: "80"
  - name: functional-test-repo
    description: Functional test repository
    type: string
    default: ""
  - name: bobshell-api-key-secret
    description: Secret name for Bob Shell API key
    type: string
    default: "bobshell-api-key"
  - name: github-token-secret
    description: Secret name for GitHub token
    type: string
    default: "github-token"
  - name: pipeline-debug
    description: Enable debug mode
    type: string
    default: "0"

  workspaces:
  - name: output
    description: Workspace for pipeline artifacts
  - name: tools-ws
    description: Workspace for shared tools and dependencies
  
  volumes:
  - name: bobshell-api-key-volume
    secret:
      secretName: bobshell-api-key
      optional: true
  - name: github-token-volume
    secret:
      secretName: github-token
      optional: true

  steps:
  - name: ai-test-generation
    image: icr.io/continuous-delivery/pipeline/pipeline-base-image:2.71
    env:
    - name: PIPELINE_DEBUG
      value: $(params.pipeline-debug)
    - name: GIT_BRANCH
      value: $(params.branch)
    - name: GIT_COMMIT
      value: $(params.revision)
    - name: BASE_BRANCH
      value: $(params.base-branch)
    - name: COVERAGE_TARGET
      value: $(params.coverage-target)
    - name: FUNCTIONAL_TEST_REPO
      value: $(params.functional-test-repo)
    - name: REPOSITORY
      value: $(params.repository)
    # API keys from secrets
    - name: BOBSHELL_API_KEY
      valueFrom:
        secretKeyRef:
          name: $(params.bobshell-api-key-secret)
          key: api-key
          optional: true
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: $(params.github-token-secret)
          key: token
          optional: true
    volumeMounts:
    - name: bobshell-api-key-volume
      mountPath: /secrets/bobshell
      readOnly: true
    - name: github-token-volume
      mountPath: /secrets/github
      readOnly: true
    workingDir: $(workspaces.output.path)
    script: |
      #!/usr/bin/env bash
      set -eo pipefail

      # Enable debug if requested
      if [ "$PIPELINE_DEBUG" = "1" ]; then
        set -x
      fi

      echo "=================================================="
      echo "🤖 AI Test Generation with Bob Shell"
      echo "=================================================="
      echo ""
      echo "Repository: $REPOSITORY"
      echo "Branch: $GIT_BRANCH"
      echo "Commit: $GIT_COMMIT"
      echo "Base Branch: $BASE_BRANCH"
      echo ""
      
      # Load secrets from mounted volumes (if available)
      if [ -f "/secrets/bobshell/api-key" ]; then
        export BOBSHELL_API_KEY=$(cat /secrets/bobshell/api-key)
        echo "✅ Bob Shell API key loaded from volume"
      elif [ -n "$BOBSHELL_API_KEY" ]; then
        echo "✅ Bob Shell API key loaded from environment"
      else
        echo "⚠️  Bob Shell API key not found (optional)"
      fi
      
      if [ -f "/secrets/github/token" ]; then
        export GITHUB_TOKEN=$(cat /secrets/github/token)
        echo "✅ GitHub token loaded from volume"
      elif [ -n "$GITHUB_TOKEN" ]; then
        echo "✅ GitHub token loaded from environment"
      else
        echo "⚠️  GitHub token not found (optional)"
      fi
      echo ""

      # Use Go from shared tools workspace
      GO_INSTALL_DIR="$(workspaces.tools-ws.path)/go"
      export PATH="$GO_INSTALL_DIR/bin:$PATH"
      export GOPATH="$(workspaces.tools-ws.path)/gopath"
      export PATH="$GOPATH/bin:$PATH"

      echo "Go version: $(go version)"
      echo "Go location: $GO_INSTALL_DIR"
      echo "GOPATH: $GOPATH"
      echo ""

      # Check if test orchestrator scripts exist in current repo
      pwd 
      
      cd /workspace
      pwd
      ls -la
      echo ""
      if [ -f "./scripts/ai-test-generator.sh" ]; then
        echo "📝 Using test orchestrator from current repository"
        chmod +x ./scripts/ai-test-generator.sh
        ./scripts/ai-test-generator.sh
      else
        echo "📥 Test orchestrator not found in current repo"
        echo "   This is expected for repositories being tested"
        echo ""
        echo "🔧 Installing test-genix orchestrator..."
        
        # Clone test-genix repo to get the orchestrator
        TEMP_DIR=$(mktemp -d)
        git clone https://github.com/tanya-shanker/test-genix.git "$TEMP_DIR/test-genix"
        cd "$TEMP_DIR/test-genix"
        
        # Build the orchestrator
        echo "🔨 Building test orchestrator..."
        go build -o /tmp/test-orchestrator .
        
        # Copy config file to workspace if it exists
        if [ -f "config/test-orchestrator-config.yaml" ]; then
          echo "📋 Copying config file..."
          mkdir -p "$(workspaces.output.path)/config"
          cp config/test-orchestrator-config.yaml "$(workspaces.output.path)/config/"
        fi
        
        # Return to original directory
        cd $(workspaces.output.path)
        
        # Run the orchestrator
        echo "🚀 Running AI test generation..."
        /tmp/test-orchestrator \
          -base="$BASE_BRANCH" \
          -head="$GIT_BRANCH" \
          -root="$(workspaces.output.path)" \
          -output="$(workspaces.output.path)/generated-tests" \
          -config="$(workspaces.output.path)/config/test-orchestrator-config.yaml" || true
        
        # Print coverage report if it exists
        echo ""
        echo "=================================================="
        echo "📊 Test Coverage Report"
        echo "=================================================="
        REPORT_FILE="$(workspaces.output.path)/generated-tests/reports/coverage-report.json"
        if [ -f "$REPORT_FILE" ]; then
          echo "Coverage Report Contents:"
          cat "$REPORT_FILE" | jq '.' || cat "$REPORT_FILE"
          echo ""
          
          # Extract and display key metrics
          if command -v jq &> /dev/null; then
            echo "Summary:"
            echo "  Before: $(cat "$REPORT_FILE" | jq -r '.coverage_before')%"
            echo "  After:  $(cat "$REPORT_FILE" | jq -r '.coverage_after')%"
            echo "  Delta:  $(cat "$REPORT_FILE" | jq -r '.coverage_delta')%"
            echo "  Target: $(cat "$REPORT_FILE" | jq -r '.coverage_target')%"
            echo "  Status: $(cat "$REPORT_FILE" | jq -r '.meets_target')"
          fi
        else
          echo "⚠️  Coverage report not found at $REPORT_FILE"
        fi
        echo "=================================================="
        
        # Cleanup
        rm -rf "$TEMP_DIR"
      fi

      # Capture exit code
      EXIT_CODE=$?

      echo ""
      echo "=================================================="
      echo "AI Test Generation Exit Code: $EXIT_CODE"
      echo "=================================================="

      # Non-blocking: always exit 0
      exit 0

# Made with Bob